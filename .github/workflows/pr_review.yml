name: Automated PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review Pull Request
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev

      # Run tests, capturing output and exit code separately
      - name: Run test suite
        id: tests
        run: |
          set +e
          uv run pytest --tb=short -q 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          set -e

      # Parse test summary line: "298 passed in 3.62s"
      - name: Parse test results
        id: parse
        run: |
          SUMMARY=$(grep -E "^[0-9]+ passed|^[0-9]+ failed|FAILED|ERROR" test_output.txt | tail -5 || echo "No summary found")
          TOTAL=$(grep -oP '^\d+ passed' test_output.txt | grep -oP '\d+' || echo "0")
          FAILED=$(grep -oP '\d+ failed' test_output.txt | grep -oP '\d+' || echo "0")
          COVERAGE=$(grep -oP 'Total coverage: \K[\d.]+' test_output.txt || echo "unknown")
          REQUIRED=$(grep -oP 'Required test coverage of \K[\d.]+' test_output.txt || echo "100")

          echo "total=${TOTAL}"      >> $GITHUB_OUTPUT
          echo "failed=${FAILED}"    >> $GITHUB_OUTPUT
          echo "coverage=${COVERAGE}" >> $GITHUB_OUTPUT
          echo "required=${REQUIRED}" >> $GITHUB_OUTPUT
          echo "summary<<EOF"         >> $GITHUB_OUTPUT
          echo "${SUMMARY}"           >> $GITHUB_OUTPUT
          echo "EOF"                  >> $GITHUB_OUTPUT

      # Collect failed test details (if any)
      - name: Collect failure details
        id: failures
        if: steps.tests.outputs.exit_code != '0'
        run: |
          DETAILS=$(grep -A5 "FAILED\|ERROR" test_output.txt | head -60 || echo "")
          echo "details<<EOF"  >> $GITHUB_OUTPUT
          echo "${DETAILS}"    >> $GITHUB_OUTPUT
          echo "EOF"           >> $GITHUB_OUTPUT

      # Post the review via GitHub API
      - name: Post PR review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const exitCode   = '${{ steps.tests.outputs.exit_code }}';
            const total      = '${{ steps.parse.outputs.total }}';
            const failed     = '${{ steps.parse.outputs.failed }}';
            const coverage   = '${{ steps.parse.outputs.coverage }}';
            const required   = '${{ steps.parse.outputs.required }}';
            const summary    = `${{ steps.parse.outputs.summary }}`;
            const failures   = `${{ steps.failures.outputs.details || '' }}`;

            const passed = (exitCode === '0');
            const coverageOk = (coverage === 'unknown') || (parseFloat(coverage) >= parseFloat(required));
            const allGood = passed && coverageOk;

            // в”Ђв”Ђ build body в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            const status = allGood
              ? '## Automated Review: APPROVED\n\nAll checks passed.'
              : '## Automated Review: CHANGES REQUESTED\n\nOne or more checks failed.';

            const testSection = `
            ### Test Results
            | Metric | Value |
            |--------|-------|
            | Tests passed | ${total} |
            | Tests failed | ${failed} |
            | Branch coverage | ${coverage === 'unknown' ? 'n/a' : coverage + '%'} |
            | Required coverage | ${required}% |
            | Overall | ${allGood ? 'вњ… PASS' : 'вќЊ FAIL'} |
            `;

            const failSection = failures
              ? `\n<details>\n<summary>Failure details</summary>\n\n\`\`\`\n${failures}\n\`\`\`\n</details>`
              : '';

            const checklist = `
            ### Review Checklist
            - [${passed ? 'x' : ' '}] All tests pass
            - [${coverageOk ? 'x' : ' '}] Branch coverage в‰Ґ ${required}%
            - [x] Code targets \`main\` branch
            - [x] CI workflow present
            `;

            const body = [status, testSection, checklist, failSection].join('\n');

            // в”Ђв”Ђ submit review в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
            await github.rest.pulls.createReview({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body:        body,
              event:       allGood ? 'APPROVE' : 'REQUEST_CHANGES',
            });
